<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dxf-render — Vanilla TS Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; }
    #toolbar { padding: 16px; display: flex; gap: 12px; align-items: center; }
    #toolbar label {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: #fff; border: 1px solid #ccc;
      border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    #toolbar label:hover { border-color: #888; }
    #status { font-size: 14px; color: #666; }
    #canvas-container { width: 100%; height: calc(100vh - 60px); }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>
      <input type="file" accept=".dxf" id="file-input" hidden />
      Open DXF file
    </label>
    <span id="status">Select a .dxf file to render</span>
  </div>
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
